services:
  - type: web
    name: taskmanager
    env: python
    region: singapore          # closest to India; alternatives: oregon, frankfurt
    plan: free                 # upgrade to 'starter' for always-on + persistent disk
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn -k eventlet -w 1 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /

    envVars:
      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a strong random value

      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString

      # SocketIO: must be 'eventlet' on Linux (Render) so gunicorn handles WebSockets
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet

      # File uploads — set to the disk mount path below
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/app/static/uploads

      # Mail — fill in after deploy via Render dashboard
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false            # set manually in Render dashboard
      - key: MAIL_PASSWORD
        sync: false            # set manually in Render dashboard
      - key: MAIL_DEFAULT_SENDER
        sync: false

      # Admin seed credentials (used by `flask seed`)
      - key: ADMIN_EMAIL
        value: admin@taskmanager.local
      - key: ADMIN_PASSWORD
        sync: false            # set a strong password in Render dashboard
      - key: ADMIN_NAME
        value: System Administrator

    disk:
      name: uploads
      mountPath: /opt/render/project/src/app/static/uploads
      sizeGB: 1                # upgrade as needed; requires paid plan

databases:
  - name: taskmanager-db
    databaseName: taskmanager
    user: taskmanager
    plan: free                 # 1 GB storage; upgrade for production workloads
