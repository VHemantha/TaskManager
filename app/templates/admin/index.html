{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <h4 class="fw-bold mb-4"><i class="bi bi-shield-check me-2"></i>Admin Panel</h4>
  <div class="row g-3">
    <div class="col-md-4">
      <a href="{{ url_for('admin.users') }}" class="card border-0 shadow-sm text-decoration-none">
        <div class="card-body text-center py-4">
          <i class="bi bi-people fs-1 text-primary mb-2 d-block"></i>
          <h5 class="fw-bold">{{ user_count }} Users</h5>
          <p class="text-muted small mb-0">Manage accounts, roles, teams</p>
        </div>
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('admin.teams') }}" class="card border-0 shadow-sm text-decoration-none">
        <div class="card-body text-center py-4">
          <i class="bi bi-diagram-3 fs-1 text-success mb-2 d-block"></i>
          <h5 class="fw-bold">{{ team_count }} Teams</h5>
          <p class="text-muted small mb-0">Organise teams and leaders</p>
        </div>
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('admin.clients') }}" class="card border-0 shadow-sm text-decoration-none">
        <div class="card-body text-center py-4">
          <i class="bi bi-building fs-1 text-info mb-2 d-block"></i>
          <h5 class="fw-bold">{{ client_count }} Clients</h5>
          <p class="text-muted small mb-0">Client directory and SLA status</p>
        </div>
      </a>
    </div>
  </div>
</div>
{% endblock %}
