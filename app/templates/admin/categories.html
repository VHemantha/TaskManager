{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0"><i class="bi bi-tags me-2"></i>Task Categories</h4>
    <a href="{{ url_for('admin.category_new') }}" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i>New Category
    </a>
  </div>
  <div class="row g-3">
    {% for cat in categories %}
    <div class="col-md-4 col-lg-3">
      <div class="card border-0 shadow-sm border-start border-4" style="border-color: {{ cat.color_code }} !important;">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold">{{ cat.name }}</span>
            <a href="{{ url_for('admin.category_edit', cat_id=cat.id) }}" class="btn btn-xs btn-outline-secondary">Edit</a>
          </div>
          <div class="small text-muted mt-1">{{ cat.description or '' }}</div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
